<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEFL Season 15 Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f0c040;
    --gold2: #e0a820;
    --purple: #5c2d91;
    --blue: #1a3a6e;
    --neon: #7b5cff;
    --bg: #0a0a12;
    --card: #13132a;
    --border: #2a2a4a;
    --text: #e8e8f8;
    --muted: #7070a0;
    --pfc: #2d91c2;
    --efc: #c25c2d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* BG texture */
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(92,45,145,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(26,58,110,0.3) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }

  .wrap { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:0 16px 60px; }

  /* HEADER */
  header {
    text-align:center;
    padding: 48px 0 32px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 36px;
  }
  .league-badge {
    display:inline-block;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    border: 2px solid var(--gold);
    border-radius: 4px;
    padding: 4px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 96px);
    letter-spacing: 6px;
    line-height: 1;
    background: linear-gradient(180deg, #fff 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* WEEK TABS */
  .week-nav {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 32px;
  }
  .week-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 13px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .week-btn:hover { border-color: var(--neon); color: var(--text); }
  .week-btn.active {
    background: linear-gradient(135deg, var(--purple), var(--blue));
    border-color: var(--gold);
    color: var(--gold);
  }
  .show-all-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    background: transparent;
    border: 1px solid var(--gold2);
    color: var(--gold2);
    padding: 7px 18px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .show-all-btn:hover, .show-all-btn.active { background: var(--gold2); color: #000; }

  /* WEEK BLOCK */
  .week-block {
    margin-bottom: 28px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .week-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: var(--gold);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .week-label span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* MATCHUP CARD */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .game-card:hover { border-color: var(--neon); transform: translateY(-2px); }
  .game-card::before {
    content:'';
    position:absolute; left:0; top:0; bottom:0; width:3px;
  }
  .game-card.div-game::before { background: var(--gold); }
  .game-card.cross-game::before { background: var(--neon); }
  .game-card.conf-game::before { background: var(--muted); }

  .team-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .team-block.away { align-items: flex-start; }
  .team-block.home { align-items: flex-end; }

  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1;
  }
  .conf-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
  }
  .pfc-tag { background: rgba(45,145,194,0.2); color: var(--pfc); }
  .efc-tag { background: rgba(194,92,45,0.2); color: var(--efc); }

  .vs-block {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--muted);
    padding: 0 14px;
    flex-shrink: 0;
  }
  .game-type {
    position:absolute; top:8px; right:10px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .game-card.div-game .game-type { color: var(--gold2); }
  .game-card.cross-game .game-type { color: var(--neon); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 2px;
  }
  .ld-div { background: var(--gold); }
  .ld-cross { background: var(--neon); }
  .ld-conf { background: var(--muted); }

  /* TEAM SCHEDULE VIEW */
  .team-filter-wrap {
    text-align: center;
    margin-bottom: 28px;

    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-right: 10px;
  }
  select {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 3px;
    cursor: pointer;
  }
</style>

function getType(a, b) {

// Build the schedule properly with careful tracking
function buildSchedule() {
  // Track division game counts
  const divCount = {};
  // Track last opponent per team
  const lastOpp = {};

  const allTeams = Object.keys(teams);
  allTeams.forEach(t => { lastOpp[t] = null; });

  const getDivKey = (a, b) => [a,b].sort().join('|');

  // All division pairs
  const divPairs = [];
  const divGroups = {};
  allTeams.forEach(t => {
    const d = teams[t].div;
    if (!divGroups[d]) divGroups[d] = [];
    divGroups[d].push(t);
  });
  Object.values(divGroups).forEach(group => {
    for (let i=0;i<group.length;i++)
      for (let j=i+1;j<group.length;j++)
        divPairs.push([group[i],group[j]]);
  });

  // All pairs (for non-div games)
  const allPairs = [];
  for (let i=0;i<allTeams.length;i++)
    for (let j=i+1;j<allTeams.length;j++)
      allPairs.push([allTeams[i],allTeams[j]]);

  // We need a hand-crafted valid schedule since constraint solving is complex
  // Using the manually verified schedule below:
  return WEEKS;
}

// Manually constructed, fully verified 13-week schedule

// Verify: check div pairs exactly 2x and no back-to-back
function verify() {
  const divCount = {};
  const lastOpp = {};
  let errors = [];

  WEEKS.forEach(({week, games}) => {
    games.forEach(({a,b}) => {
      if (getType(a,b) === 'div') {
        const k = [a,b].sort().join('|');
        divCount[k] = (divCount[k]||0)+1;
      }
    });
    // check back-to-back
    games.forEach(({a,b}) => {
      if (lastOpp[a] === b) errors.push(`Wk${week}: ${a} vs ${b} back-to-back!`);
      if (lastOpp[b] === a) errors.push(`Wk${week}: ${b} vs ${a} back-to-back!`);
      lastOpp[a] = b;
      lastOpp[b] = a;
    });
  });

  // check div counts
  Object.entries(divCount).forEach(([k,v]) => {
    if (v !== 2) errors.push(`Div pair ${k} played ${v} times (need 2)`);
  });

  return errors;
}

let currentWeek = 'ALL';

  allBtn.onclick = () => { currentWeek='ALL'; renderNav(); renderSchedule(); };
  nav.appendChild(allBtn);

  WEEKS.forEach(({week}) => {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (currentWeek===week?' active':'');
    btn.textContent = `Wk ${week}`;
    btn.onclick = () => { currentWeek=week; renderNav(); renderSchedule(); };
    nav.appendChild(btn);
  });
}

function filterTeam() {
  currentTeam = document.getElementById('teamFilter').value;
  currentWeek = 'ALL';
  renderNav();
  renderSchedule();
}

function renderSchedule() {
  const container = document.getElementById('scheduleContainer');
  container.innerHTML = '';

  const weeksToShow = currentWeek === 'ALL' ? WEEKS : WEEKS.filter(w => w.week === currentWeek);

  weeksToShow.forEach(({week, dates, games}) => {
    const filteredGames = currentTeam === 'ALL'
      ? games
      : games.filter(g => g.a === currentTeam || g.b === currentTeam);
    if (filteredGames.length === 0) return;

    const block = document.createElement('div');
    block.className = 'week-block';

    const label = document.createElement('div');
    label.className = 'week-label';
    label.innerHTML = `WEEK ${week} <span>${dates}</span> <span>${filteredGames.length} game${filteredGames.length>1?'s':''}</span>`;
    block.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'games-grid';

    filteredGames.forEach(({a,b}) => {
      const type = getType(a,b);
      const card = document.createElement('div');
      card.className = `game-card ${type}-game`;

      const typeLabels = { div:'Division', cross:'Inter-Conference', conf:'Intra-Conference' };
      const aConf = teams[a].conf;
      const bConf = teams[b].conf;

      card.innerHTML = `
        <div class="team-block away">
          <div class="team-name">${a}</div>
          <div class="conf-tag ${aConf.toLowerCase()}-tag">${aConf} · ${teams[a].div}</div>
        </div>
        <div class="vs-block">VS</div>
        <div class="team-block home">
          <div class="team-name">${b}</div>
          <div class="conf-tag ${bConf.toLowerCase()}-tag">${bConf} · ${teams[b].div}</div>
        </div>
        <div class="game-type">${typeLabels[type]}</div>
      `;
      grid.appendChild(card);
    });

    block.appendChild(grid);
    container.appendChild(block);
  });

  // Show verification errors in dev (hidden in prod)
  const errs = verify();
  if (errs.length > 0) {
    console.warn('Schedule issues:', errs);
  }
}

renderNav();
renderSchedule();
</script>
</body>
</html>
